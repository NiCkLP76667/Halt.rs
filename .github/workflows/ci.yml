name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Test Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --verbose
      - name: Run clippy
        run: cargo clippy -- -D warnings
      - name: Check formatting
        run: cargo fmt --check

  test-mcp:
    name: Test MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json
      - name: Install dependencies
        run: cd mcp-server && npm ci
      - name: Run tests
        run: cd mcp-server && npm test
      - name: Build
        run: cd mcp-server && npm run build

  test-python:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd bindings/python
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        run: cd bindings/python && python -m pytest tests/ -v

  test-java:
    name: Test Java Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compile Java
        run: javac -d target/classes HaltProxy.java
      - name: Test compilation
        run: java -cp target/classes com.halt.HaltProxy --help || echo "Java compilation successful"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-rust, test-mcp, test-python, test-java]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t halt-rs:latest -f docker/Dockerfile .
      - name: Test Docker image
        run: |
          docker run -d --name halt-test -p 8080:8080 halt-rs:latest
          sleep 10
          curl -f http://localhost:8080/health
          docker stop halt-test

  build-release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    needs: [test-rust, test-mcp, test-python, test-java]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: halt-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/halt*

  publish:
    name: Publish to Package Registries
    runs-on: ubuntu-latest
    needs: [build-docker, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Publish MCP server to npm
        run: |
          cd mcp-server
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish Python package to PyPI
        run: |
          cd bindings/python
          pip install twine
          python setup.py sdist bdist_wheel
          twine upload dist/* --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your deployment commands here
